name: Release

# Changesets' two-step flow gates every VERSION BUMP behind a reviewable PR:
#   1. A push to main with pending changesets (.changeset/*.md, not config.json/README.md)
#      opens/updates a "Version Packages" PR that bumps versions and updates changelogs.
#   2. Only merging THAT PR runs this workflow again with no pending changesets left, which
#      is when `changesets/action` runs `pnpm -r publish` and actually ships the new version.
#
# CORRECTION (2026-07-17, learned the hard way): this gate does NOT cover the very first
# publish of a package. With no prior git tag to compare against, `changeset publish` treats
# the package's current version as unpublished and ships it immediately on the first run that
# reaches this step — no changeset needed. That's what happened when this workflow first ran:
# all 5 packages published at 0.0.1 on the very first push, before any changeset existed.
# Every publish AFTER that first one does go through the PR gate described above.
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is scoped to this repo and has packages:write via the `permissions`
          # block above — no separate PAT needed to publish to this repo's own GitHub Packages.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
